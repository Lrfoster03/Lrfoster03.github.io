<h1>Reading Progress Bar</h1>

<p>
 Follow along with me as I catalog the books I'm currently reading and have finished:
</p>

<div id="in-progress-list"></div>

<header class="post-header"></header>

<h1>Finished Books in 2025</h1>

<div id="finished-list"></div>

<script>
  (function () {
    const CONFIG_NAME = "reading_list_dynamic_config";
    const EMPTY_CONFIG = { inProgress: [], finished: [] };

    function isValidBook(book) {
      return (
        book &&
        typeof book.name === "string" &&
        typeof book.currentPage === "number" &&
        typeof book.totalPages === "number"
      );
    }

    function normalizeConfig(config) {
      if (!config || typeof config !== "object") {
        return EMPTY_CONFIG;
      }

      const inProgress = Array.isArray(config.inProgress)
        ? config.inProgress.filter(isValidBook)
        : [];
      const finished = Array.isArray(config.finished)
        ? config.finished.filter(function (name) {
            return typeof name === "string" && name.trim().length > 0;
          })
        : [];

      return { inProgress: inProgress, finished: finished };
    }

    function createProgressSection(title, percentage, cssClass, subtitle) {
      const section = document.createElement("div");
      section.className = "progress-section";

      const heading = document.createElement("h2");
      heading.textContent = title;
      section.appendChild(heading);

      if (subtitle) {
        const details = document.createElement("p");
        details.className = "progress-details";
        details.textContent = subtitle;
        section.appendChild(details);
      }

      const container = document.createElement("div");
      container.className = "progress-container";

      const bar = document.createElement("div");
      bar.className = cssClass;
      bar.style.width = percentage + "%";
      bar.textContent = percentage + "%";

      container.appendChild(bar);
      section.appendChild(container);

      return section;
    }

    function renderInProgressBooks(inProgress) {
      const target = document.getElementById("in-progress-list");
      target.innerHTML = "";

      if (!inProgress.length) {
        const empty = document.createElement("p");
        empty.textContent = "No books are currently in progress.";
        target.appendChild(empty);
        return;
      }

      inProgress.forEach(function (book, index) {
        const safeTotal = book.totalPages > 0 ? book.totalPages : 1;
        const progress = Math.min(
          100,
          Math.max(0, Math.round((book.currentPage * 100) / safeTotal))
        );
        const cssClass =
          progress >= 100
            ? "progress-barFinished"
            : index % 2 === 0
              ? "progress-barLog"
              : "progress-barMax";

        target.appendChild(
          createProgressSection(
            book.name,
            progress,
            cssClass,
            book.currentPage + " / " + book.totalPages + " pages"
          )
        );
      });
    }

    function renderFinishedBooks(finished) {
      const target = document.getElementById("finished-list");
      target.innerHTML = "";

      if (!finished.length) {
        const empty = document.createElement("p");
        empty.textContent = "No finished books yet.";
        target.appendChild(empty);
        return;
      }

      finished.forEach(function (bookName) {
        target.appendChild(
          createProgressSection(bookName, 100, "progress-barFinished")
        );
      });
    }

    function renderFromConfig(config) {
      const normalized = normalizeConfig(config);
      renderInProgressBooks(normalized.inProgress);
      renderFinishedBooks(normalized.finished);
    }

    function readConfig() {
      if (typeof window.getStatsigDynamicConfigValue === "function") {
        return window.getStatsigDynamicConfigValue(CONFIG_NAME, EMPTY_CONFIG);
      }
      return EMPTY_CONFIG;
    }

    function waitForStatsigAndRender() {
      const initPromise =
        typeof window.whenStatsigReady === "function"
          ? window.whenStatsigReady()
          : Promise.resolve();
      const timeoutPromise = new Promise(function (resolve) {
        setTimeout(resolve, 5000);
      });

      Promise.race([initPromise, timeoutPromise]).finally(function () {
        renderFromConfig(readConfig());
      });

      initPromise.finally(function () {
        renderFromConfig(readConfig());
      });
    }

    waitForStatsigAndRender();
  })();
</script>

<style>
  .progress-container {
    width: 100%;
    background-color: #eee;
    border-radius: 8px;
    overflow: hidden;
    height: 30px;
    margin-bottom: 20px;
  }

  .progress-barLog {
    height: 100%;
    background-color: #408ec2;
    text-align: center;
    line-height: 30px;
    color: white;
    transition: width 0.3s ease;
  }

  .progress-barMax {
    height: 100%;
    background-color: rgb(180, 52, 52);
    text-align: center;
    line-height: 30px;
    color: white;
    transition: width 0.3s ease;
  }

  .progress-barFinished {
    height: 100%;
    background-color: rgb(57, 184, 89);
    text-align: center;
    line-height: 30px;
    color: white;
    transition: width 0.3s ease;
  }

  .progress-section {
    margin-bottom: 40px;
  }

  .progress-details {
    margin-top: -0.5rem;
    margin-bottom: 0.75rem;
  }
</style>
