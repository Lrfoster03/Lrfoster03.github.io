<!-- Begin selecting skin -->
<script>
  (function () {
    const STORAGE_KEY = "site-theme";
    const SKINS = {
      light: "{{ '/assets/css/skin-daylight.css' | relative_url }}",
      dark: "{{ '/assets/css/skin-midnight.css' | relative_url }}",
    };

    function readStoredTheme() {
      try {
        const value = localStorage.getItem(STORAGE_KEY);
        return value === "light" || value === "dark" ? value : null;
      } catch (_) {
        return null;
      }
    }

    function getSystemTheme() {
      return window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: dark)").matches
        ? "dark"
        : "light";
    }

    function resolveTheme() {
      return readStoredTheme() || getSystemTheme();
    }

    const themeLink = document.createElement("link");
    themeLink.id = "site-skin";
    themeLink.setAttribute("rel", "stylesheet");
    themeLink.setAttribute("type", "text/css");

    function setTheme(theme, persist) {
      const normalized = theme === "dark" ? "dark" : "light";
      themeLink.setAttribute("href", SKINS[normalized]);
      document.documentElement.setAttribute("data-theme", normalized);

      if (persist) {
        try {
          localStorage.setItem(STORAGE_KEY, normalized);
        } catch (_) {}
      }

      window.dispatchEvent(
        new CustomEvent("site-theme-changed", {
          detail: { theme: normalized },
        })
      );

      return normalized;
    }

    window.getSiteTheme = function () {
      return document.documentElement.getAttribute("data-theme") || resolveTheme();
    };

    window.setSiteTheme = function (theme) {
      return setTheme(theme, true);
    };

    window.toggleSiteTheme = function () {
      return setTheme(window.getSiteTheme() === "dark" ? "light" : "dark", true);
    };

    setTheme(resolveTheme(), false);
    document.getElementsByTagName("head")[0].appendChild(themeLink);

    if (window.matchMedia) {
      const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");
      if (typeof mediaQuery.addEventListener === "function") {
        mediaQuery.addEventListener("change", function (event) {
          if (!readStoredTheme()) {
            setTheme(event.matches ? "dark" : "light", false);
          }
        });
      }
    }
  })();
</script>
<!-- End selecting skin -->
