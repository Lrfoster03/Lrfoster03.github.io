name: Deploy Jekyll site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Create temporary config with secrets
        run: |
          # Create a temporary config file with the secret
          cat > _config_secrets.yml << EOF
          env:
            STATSIG_CLIENT_SDK_KEY: '${{ secrets.STATSIG_CLIENT_SDK_KEY }}'
          EOF

      - name: Build with Jekyll
        run: |
          bundle exec jekyll build \
            --baseurl "${{ steps.pages.outputs.base_path }}" \
            --config "_config.yml,_config_secrets.yml" \
            --destination ./_site
        env:
          JEKYLL_ENV: production

      - name: Clean up temporary config
        run: rm -f _config_secrets.yml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
